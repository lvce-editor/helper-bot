# eslint-disable github-actions/on
name: nightly-org-release-plan
run-name: nightly-org-release-plan

on:
  schedule:
    - cron: '0 3 * * *'
      timezone: Europe/Berlin
  workflow_dispatch: {}

permissions:
  actions: read
  contents: read
  metadata: read

jobs:
  plan-release-tags:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - name: Compute node modules cache key
        id: nodeModulesCacheKey
        run: echo "value=$(node scripts/computeNodeModulesCacheKey.js)" >> $GITHUB_OUTPUT
        shell: bash
      - uses: actions/cache@v5
        id: npm-cache
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-cacheNodeModules-${{ steps.nodeModulesCacheKey.outputs.value }}
      - name: npm ci
        run: npm ci
        if: steps.npm-cache.outputs.cache-hit != 'true'
      - name: Build
        run: npm run build
      - name: Plan org release tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MIGRATION_ARTIFACT_DIR: ${{ runner.temp }}/migration-result-nightly-org-release-${{ github.run_id }}-${{ github.run_attempt }}
          REQUEST_ID: nightly-org-release-${{ github.run_id }}-${{ github.run_attempt }}
        run: node packages/migrations/dist/runOrgReleasePlanWorkflow.js
      - name: Upload migration artifact
        if: always()
        # eslint-disable-next-line github-actions/action-versions
        uses: actions/upload-artifact@v4
        with:
          name: migration-result-nightly-org-release-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/migration-result-nightly-org-release-${{ github.run_id }}-${{ github.run_attempt }}
          include-hidden-files: true
          if-no-files-found: error
